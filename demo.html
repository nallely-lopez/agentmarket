<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentMarket — AI Agent Marketplace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08080f;
      --surface:   #10101c;
      --border:    #1e1e30;
      --primary:   #7c5cfc;
      --primary-h: #9b7dff;
      --success:   #10b981;
      --warning:   #f59e0b;
      --error:     #ef4444;
      --info:      #38bdf8;
      --muted:     #4a4a6a;
      --text:      #dde2f0;
      --text-dim:  #7a7a9a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 1rem;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff 30%, #9b7dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }
    .subtitle {
      margin-top: .75rem;
      color: var(--text-dim);
      font-size: .95rem;
    }
    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: .25rem .7rem;
      border-radius: 999px;
      border: 1px solid #2a2a44;
      font-size: .72rem;
      color: var(--text-dim);
      letter-spacing: .06em;
    }
    .badge span { color: var(--primary); font-weight: 600; }

    /* ── Main card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,.5);
    }

    /* ── Actions ── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: .35rem;
      padding: 1.1rem 1.25rem;
      background: #16162a;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .1s;
      text-align: left;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,92,252,.12), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .btn:hover { border-color: var(--primary); background: #1a1a30; }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-icon {
      font-size: 1.4rem;
      line-height: 1;
    }
    .btn-label {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
    }
    .btn-price {
      font-size: .72rem;
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
    }
    .btn-price strong { color: var(--primary); }

    /* ── Log terminal ── */
    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.5rem;
      background: #0d0d1a;
      border-bottom: 1px solid var(--border);
    }
    .terminal-title {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .72rem;
      cursor: pointer;
      padding: .2rem .5rem;
      border-radius: 4px;
      transition: color .2s;
    }
    .clear-btn:hover { color: var(--text-dim); }

    #log {
      padding: 1.25rem 1.5rem;
      min-height: 260px;
      max-height: 420px;
      overflow-y: auto;
      font-family: 'Courier New', Consolas, monospace;
      font-size: .82rem;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #log:empty::before {
      content: 'Haz clic en un botón para iniciar la demo...';
      color: var(--muted);
      font-style: italic;
    }

    .log-line {
      display: flex;
      gap: .75rem;
      align-items: baseline;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-msg  { flex: 1; word-break: break-all; }

    .log-info    .log-msg { color: var(--info); }
    .log-success .log-msg { color: var(--success); }
    .log-warning .log-msg { color: var(--warning); }
    .log-error   .log-msg { color: var(--error); }
    .log-result  .log-msg { color: #c084fc; white-space: pre; }
    .log-link    .log-msg a { color: #1D9E75; text-decoration: none; font-weight: 600; }
    .log-link    .log-msg a:hover { text-decoration: underline; }
    .log-system  .log-msg { color: var(--text-dim); }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: .75rem;
      text-align: center;
      line-height: 1.8;
    }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Stellar Testnet — x402 Protocol
    </div>
    <h1>AgentMarket<br>AI Agent Marketplace</h1>
    <p class="subtitle">Agentes de IA que pagan automáticamente por servicios en blockchain</p>
    <span class="badge">Red: <span>Stellar Testnet</span> &nbsp;·&nbsp; Precio: <span>0.001 USDC / llamada</span></span>
  </header>

  <div class="card">
    <div class="actions">
      <button class="btn" id="btn-translate" onclick="runDemo('translate')">
        <span class="btn-icon">🌐</span>
        <span class="btn-label">Traducir texto</span>
        <span class="btn-price">Paga <strong>0.001 USDC</strong> automáticamente</span>
      </button>
      <button class="btn" id="btn-price" onclick="runDemo('price')">
        <span class="btn-icon">₿</span>
        <span class="btn-label">Consultar precio BTC</span>
        <span class="btn-price">Paga <strong>0.001 USDC</strong> automáticamente</span>
      </button>
    </div>

    <div class="terminal-header">
      <span class="terminal-title">Log del agente</span>
      <button class="clear-btn" onclick="clearLog()">limpiar</button>
    </div>
    <div id="log"></div>
  </div>

  <footer>
    Powered by <a href="https://stellar.org" target="_blank">Stellar</a> &amp; x402 Protocol &nbsp;·&nbsp;
    <a href="/services" target="_blank">Ver catálogo JSON</a> &nbsp;·&nbsp;
    <a href="https://stellar.expert/explorer/testnet" target="_blank">Stellar Explorer</a>
  </footer>

  <script>
    function ts() {
      return new Date().toLocaleTimeString('es', { hour12: false });
    }

    // MEJORA 9: addLog acepta texto opcional para links (en vez de mostrar la URL cruda)
    function addLog(type, msg, linkText) {
      const log = document.getElementById('log');
      const line = document.createElement('div');
      line.className = `log-line log-${type}`;

      if (type === 'link') {
        const label = linkText || 'Ver en explorador →';
        line.innerHTML = `<span class="log-time">${ts()}</span><span class="log-msg"><a href="${msg}" target="_blank">${label}</a></span>`;
      } else {
        line.innerHTML = `<span class="log-time">${ts()}</span><span class="log-msg">${escHtml(msg)}</span>`;
      }

      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function setButtons(disabled) {
      document.getElementById('btn-translate').disabled = disabled;
      document.getElementById('btn-price').disabled = disabled;
    }

    async function runDemo(service) {
      clearLog();
      setButtons(true);

      const label = service === 'translate' ? 'Traducir texto' : 'Consultar precio BTC';
      addLog('system', `▶  Iniciando: ${label}`);

      try {
        const resp = await fetch('/demo/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ service }),
        });

        if (!resp.ok && !resp.body) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let   buf     = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buf += decoder.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop(); // keep incomplete chunk

          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }
            handleEvent(event);
          }
        }
      } catch (err) {
        // MEJORA 8: error de red con mensaje de ayuda
        addLog('error', 'Error de conexión: ' + err.message);
        const hint = getErrorHint(err.message);
        if (hint) addLog('warning', `💡 ${hint}`);
        else addLog('warning', '💡 No se puede conectar al servidor.');
      } finally {
        setButtons(false);
      }
    }

    // MEJORA 8: Mensajes de ayuda según tipo de error
    function getErrorHint(msg) {
      const m = msg.toLowerCase();
      if (m.includes('saldo insuficiente') || m.includes('necesita usdc')) {
        return 'El agente se quedó sin USDC testnet. Fondea la wallet del agente.';
      }
      if (m.includes('timeout') || m.includes('tardó') || m.includes('econnaborted')) {
        return 'El servidor tardó demasiado. Intenta de nuevo.';
      }
      if (m.includes('network') || m.includes('econnrefused') || m.includes('failed to fetch')) {
        return 'No se puede conectar al servidor.';
      }
      return null;
    }

    function handleEvent(e) {
      switch (e.step) {
        // MEJORA 7: mostrar saldo antes del flujo
        case 'balance':
          addLog('info', `💰 ${e.message}`);
          break;
        case 'calling':
          addLog('info', e.message);
          break;
        case 'payment_required':
          addLog('warning', `↩  402 Payment Required recibido`);
          addLog('warning', `   Precio:   ${e.price} ${e.asset}`);
          addLog('warning', `   Receptor: ${e.receiver}`);
          addLog('info', `⏳ Construyendo y firmando transacción Stellar...`);
          break;
        case 'paying':
          addLog('info', e.message);
          break;
        case 'payment_confirmed':
          // MEJORA 9: link clickeable con texto descriptivo y URL desde el servidor
          addLog('success', `✔  Pago confirmado TX: ${e.txHash}`);
          addLog('link', e.explorerUrl, 'Ver en explorador →');
          addLog('info', `↪  Reintentando con comprobante de pago...`);
          break;
        case 'done': {
          addLog('success', `✔  Servicio entregado`);
          const pretty = JSON.stringify(e.data, null, 2);
          addLog('result', pretty);
          break;
        }
        // PASO 7: Mostrar reputación on-chain con link al contrato
        case 'reputation':
          addLog('success', `⭐ ${e.message}`);
          addLog('link', e.contractUrl, `Ver contrato en explorador →`);
          break;
        case 'error': {
          // MEJORA 8: error en rojo + mensaje de ayuda contextual
          addLog('error', `✖  ${e.message}`);
          const hint = getErrorHint(e.message);
          if (hint) addLog('warning', `💡 ${hint}`);
          break;
        }
      }
    }
  </script>
</body>
</html>
